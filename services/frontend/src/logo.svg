<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <!-- Gradients for a polished enterprise feel -->
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- The Hexagon (Pharma/Chemistry Foundation) -->
  <polygon points="50,15 80.3,32.5 80.3,67.5 50,85 19.7,67.5 19.7,32.5" fill="none" stroke="#1F2937" stroke-width="4.5" stroke-linejoin="round"/>
  
  <!-- The Ingestion Firewall Shield -->
  <path d="M36,35 L64,35 L64,55 C64,68 50,76 50,76 C50,76 36,68 36,55 Z" fill="url(#emerald)"/>
  
  <!-- The 3 Nodes (Oxalis 3-leaf motif / GraphRAG mapping) -->
  <circle cx="50" cy="44" r="3.5" fill="#FFFFFF"/>
  <circle cx="43" cy="55" r="3.5" fill="#FFFFFF"/>
  <circle cx="57" cy="55" r="3.5" fill="#FFFFFF"/>
  
  <!-- Connecting deterministic lines for the nodes -->
  <path d="M50,44 L43,55 M50,44 L57,55 M43,55 L57,55" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Enterprise Typography -->
  <text x="105" y="60" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="34" fill="#1F2937" letter-spacing="-0.5">Vali<tspan fill="#047857">Dossier</tspan></text>
  <text x="108" y="78" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="10" fill="#6B7280" letter-spacing="1.5">TEAM OXALIS</text>
</svg>
